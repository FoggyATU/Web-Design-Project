<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="The contact page for my hobbies website">
    <meta name="keywords" content="Contact, Email, Contact Me">
    <title>Contact</title>
    <link rel="stylesheet" href="styles/style.css">
</head>

<body>
    <main>
        <header>
            <h1>Contact</h1>
            <nav>
                <ul>
                    <li><a href="index.html">HOME</a></li>
                    <li><a href="programming.html">PROGRAMMING</a></li>
                    <li><a href="music.html">MUSIC</a></li>
                    <li><a href="photos.html">PHOTOGRAPHY</a></li>
                    <li><a id="activeLink" href="contact.html">CONTACT</a></li>
                </ul>
            </nav>
        </header>
        <section>
           <h3>Please fill out the form below to get in contact with me!</h3>
           <form action="http://foo.com" method="get">
                <label for="first_name">First Name:<span class="required">*</span></label>
                <input type="text" name="first_name" id="first_name" autofocus required><br>

                <label for="last_name">Last Name:<span class="required">*</span></label>
                <input type="text" name="last_name" id="last_name" required><br>

                <label for="email">Email:<span class="required">*</span></label>
                <input type="email" name="email" id="email" required placeholder="youremail@email.com"><br>

                <label for="reason">Reason for contact:</label><br>
                <input type="radio" name="reason" id="reason" value="question" checked>Question<br>
                <input type="radio" name="reason" id="reason" value="idea">Idea<br>
                <input type="radio" name="reason" id="reason" value="bug">Site Bug<br>
                <input type="radio" name="reason" id="reason" value="other">Other<br>

                <label for="message">Your message</label><br>
                <textarea cols="50" rows="10" id="message" name="message" placeholder="Your message" maxlength="150"></textarea><br>

                <p class="smallText">Fields marked with <span class="required">*</span> are required</p>
                <input type="submit" value="Submit"><br>
                <input type="reset" name="reset" id="reset" value="Reset">
           </form>
        </section>
    </main>
    <footer>
            <p>Copyright&copy; 2026</p>
            <p>This is a college project</p>
    </footer>
</body>

</html>
